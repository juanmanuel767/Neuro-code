<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aquila News | Inteligencia de Vuelo 🦅</title>
    <style>
        :root {
            --bg: #0a0b10;
            --glass: rgba(255, 255, 255, 0.05);
            --accent: #00d2ff;
            --accent-glow: rgba(0, 210, 255, 0.3);
            --text: #e0e0e0;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(0, 210, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(147, 51, 234, 0.05) 0%, transparent 40%);
            min-height: 100vh;
        }

        header {
            padding: 3rem 1rem;
            text-align: center;
            border-bottom: 1px solid var(--glass);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        h1 {
            font-size: 2.5rem;
            margin: 0;
            background: linear-gradient(to right, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .subtitle {
            opacity: 0.6;
            font-size: 1rem;
            margin-top: 0.5rem;
        }

        main {
            max-width: 900px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .btn {
            background: var(--glass);
            border: 1px border solid rgba(255,255,255,0.1);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow);
            transform: translateY(-2px);
        }

        .news-grid {
            display: grid;
            gap: 1.5rem;
        }

        .news-card {
            background: var(--glass);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1.5rem;
            border-radius: 20px;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            animation: fadeIn 0.5s ease backwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .news-card:hover {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.08);
        }

        .news-card h3 {
            margin: 0 0 0.75rem 0;
            color: var(--accent);
            font-size: 1.25rem;
        }

        .news-card p {
            margin: 0;
            line-height: 1.6;
            opacity: 0.8;
        }

        .id-badge {
            background: rgba(255, 255, 255, 0.1);
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 0.75rem;
            margin-right: 8px;
            vertical-align: middle;
        }

        .loading {
            text-align: center;
            padding: 4rem;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <header>
        <h1>Aquila News Agent 🦅</h1>
        <div class="subtitle">Microservicio de Inteligencia asíncrona v2.0</div>
    </header>

    <main>
        <div class="toolbar">
            <h2>Últimas Sincronizaciones</h2>
            <button class="btn" onclick="sincronizar()">♻️ Sincronizar Ahora</button>
        </div>

        <div id="news-container" class="news-grid">
            <div class="loading">Cargando inteligencia del águila...</div>
        </div>
    </main>

    <script>
        async function fetchNews() {
            try {
                const response = await fetch('/noticias');
                const data = await response.json();
                renderNews(data);
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('news-container').innerHTML = '<div class="loading">❌ Error al conectar con el motor de Aquila.</div>';
            }
        }

        function renderNews(news) {
            const container = document.getElementById('news-container');
            if (news.length === 0) {
                container.innerHTML = '<div class="loading">No hay noticias en la base de datos local.</div>';
                return;
            }

            container.innerHTML = news.map((item, index) => `
                <div class="news-card" style="animation-delay: ${index * 0.1}s">
                    <h3><span class="id-badge">#${item.id}</span> ${item.titulo}</h3>
                    <p>${item.contenido || 'Contenido procesado por el motor neural de Aquila.'}</p>
                </div>
            `).join('');
        }

        async function sincronizar() {
            const btn = document.querySelector('.btn');
            btn.innerHTML = '⏳ Sincronizando...';
            btn.disabled = true;
            
            try {
                await fetch('/sincronizar');
                setTimeout(fetchNews, 1000);
            } catch (e) {
                alert('Error al sincronizar');
            } finally {
                btn.innerHTML = '♻️ Sincronizar Ahora';
                btn.disabled = false;
            }
        }

        fetchNews();
    </script>
</body>
</html>
